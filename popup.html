<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FB Post Scraper</title>
  <style>
    * { box-sizing: border-box; }
    body {
      width: 450px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background: #ffffff;
      max-height: 600px;
      overflow-y: auto;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 18px;
      margin: 0;
      color: #1877f2;
      font-weight: 700;
    }
    .header .badge {
      background: #1877f2;
      color: white;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }
    .search-box {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e4e6eb;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    input:focus { border-color: #1877f2; }
    button {
      background: #1877f2;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    button:hover { background: #166fe5; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary { background: #e4e6eb; color: #1c1e21; }
    button.secondary:hover { background: #d8dade; }
    button.success { background: #28a745; }
    button.success:hover { background: #218838; }
    button.danger { background: #dc3545; }
    button.danger:hover { background: #c82333; }
    button.export { background: #17a2b8; }
    button.export:hover { background: #138496; }
    
    .status {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 10px;
      min-height: 36px;
    }
    .status.idle { color: #65676b; background: #f0f2f5; }
    .status.loading { color: #1877f2; background: #e7f3ff; }
    .status.success { color: #28a745; background: #e8f5e9; }
    .status.error { color: #dc3545; background: #fde8e8; }
    .status.info { color: #17a2b8; background: #e3f3f5; }
    
    .stats {
      display: none;
      background: #f0f2f5;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .stats .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .stats .count {
      font-size: 22px;
      font-weight: 700;
      color: #1877f2;
    }
    .stats .label { font-size: 13px; color: #65676b; }
    
    .export-section {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .export-section button {
      flex: 1;
      padding: 8px;
      font-size: 12px;
    }
    
    .results {
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid #e4e6eb;
      border-radius: 8px;
      padding: 8px;
    }
    .post {
      background: white;
      border: 1px solid #e4e6eb;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .post:hover {
      background: #f7f8fa;
      border-color: #1877f2;
    }
    .post .text {
      font-size: 12px;
      line-height: 1.4;
      color: #1c1e21;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .post .metrics {
      display: flex;
      gap: 12px;
      font-size: 11px;
      color: #65676b;
    }
    .post .metrics span { display: flex; align-items: center; gap: 3px; }
    
    .empty {
      text-align: center;
      padding: 30px 20px;
      color: #65676b;
    }
    .empty .icon { font-size: 36px; display: block; margin-bottom: 8px; }
    .empty .sub { font-size: 12px; color: #a0a0a0; }
    
    .controls {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .controls button { flex: 1; padding: 8px; font-size: 12px; }
    .hint {
      text-align: center;
      font-size: 11px;
      color: #a0a0a0;
      padding: 8px;
      margin-top: 8px;
      border-top: 1px solid #e4e6eb;
    }
    
    .page-info {
      font-size: 12px;
      color: #65676b;
      padding: 4px 0;
      margin-bottom: 8px;
      background: #f8f9fa;
      padding: 8px;
      border-radius: 6px;
    }
    .page-info strong { color: #1c1e21; }
    
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 2px; }
    ::-webkit-scrollbar-thumb { background: #c1c7cd; border-radius: 2px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>📊 FB Post Scraper</h1>
    <span class="badge">v4.0</span>
  </div>
  
  <div class="page-info" id="pageInfo">
    <strong>Page:</strong> <span id="pageName">Loading...</span>
  </div>
  
  <div class="search-box">
    <input type="text" id="keyword" placeholder="Filter by keyword (optional)" />
    <button id="searchBtn">Scrape</button>
  </div>
  
  <div class="status idle" id="status">Enter a keyword and click Scrape, or use Auto-Scrape</div>
  
  <div class="controls">
    <button id="autoScrapeBtn" class="secondary" style="flex:1;">🔄 Auto-Scrape</button>
    <button id="stopBtn" class="danger" style="display:none;flex:1;">⏹ Stop</button>
    <button id="clearBtn" class="secondary" style="flex:0.5;">✕</button>
  </div>
  
  <div class="stats" id="stats">
    <div class="row">
      <span>
        <span class="count" id="postCount">0</span>
        <span class="label"> posts scraped</span>
      </span>
      <span class="label" id="scanInfo">0 scanned</span>
    </div>
  </div>
  
  <div class="export-section">
    <button id="exportCsvBtn" class="export" style="flex:1;">📄 CSV</button>
    <button id="exportJsonBtn" class="export" style="flex:1;">📋 JSON</button>
    <button id="exportExcelBtn" class="export" style="flex:1;">📊 Excel</button>
  </div>
  
  <div class="results" id="results">
    <div class="empty">
      <span class="icon">🔍</span>
      No posts scraped yet
      <div class="sub">Click Scrape to start collecting posts</div>
    </div>
  </div>
  
  <div class="hint">💡 Click any post to open it • Auto-Scrape scrolls down to collect more</div>
  
  <script src="popup.js"></script>
</body>
</html>
