<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Facebook Post Scraper and Finder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      width: 480px; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #f0f2f5;
      padding: 16px;
    }
    .container {
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid #1877f2;
    }
    .header h1 {
      font-size: 18px;
      color: #1877f2;
      font-weight: 700;
      flex: 1;
    }
    .header .badge {
      background: #1877f2;
      color: white;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }
    .page-info {
      background: #f7f8fa;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
      font-size: 13px;
      color: #1c1e21;
    }
    .page-info .label {
      color: #65676b;
      font-size: 11px;
      text-transform: uppercase;
      font-weight: 600;
    }
    .page-info .name {
      font-weight: 600;
      margin-top: 2px;
      word-break: break-all;
    }
    .search-box {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .search-box input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
    }
    .search-box input:focus {
      border-color: #1877f2;
      box-shadow: 0 0 0 2px rgba(24,119,242,0.2);
    }
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-primary {
      background: #1877f2;
      color: white;
    }
    .btn-primary:hover { background: #166fe5; }
    .btn-primary:disabled {
      background: #9bb7e8;
      cursor: not-allowed;
    }
    .btn-success {
      background: #42b72a;
      color: white;
    }
    .btn-success:hover { background: #36a420; }
    .btn-danger {
      background: #e74c3c;
      color: white;
    }
    .btn-danger:hover { background: #c0392b; }
    .btn-warning {
      background: #f39c12;
      color: white;
    }
    .btn-warning:hover { background: #d68910; }
    .btn-outline {
      background: transparent;
      color: #65676b;
      border: 1px solid #d1d5db;
    }
    .btn-outline:hover { background: #f0f2f5; }
    .btn-sm { padding: 4px 12px; font-size: 12px; }
    .btn-group {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .status {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 12px;
      min-height: 38px;
      display: flex;
      align-items: center;
    }
    .status.idle { background: #f0f2f5; color: #65676b; }
    .status.loading { background: #e7f3ff; color: #1877f2; }
    .status.success { background: #e6f7e6; color: #1e7e34; }
    .status.error { background: #fde8e8; color: #c0392b; }
    .status.info { background: #e8f0fe; color: #1967d2; }
    .stats {
      display: none;
      background: #f7f8fa;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .stats .count {
      font-weight: 700;
      color: #1877f2;
      font-size: 18px;
    }
    .stats .scan-info {
      color: #65676b;
      font-size: 12px;
      margin-top: 4px;
    }
    .results-container {
      max-height: 400px;
      overflow-y: auto;
      border: 1px solid #e4e6eb;
      border-radius: 8px;
      background: #fafafa;
    }
    .results-container::-webkit-scrollbar {
      width: 6px;
    }
    .results-container::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 3px;
    }
    .results-container::-webkit-scrollbar-thumb {
      background: #c1c7cd;
      border-radius: 3px;
    }
    .post {
      padding: 10px 12px;
      border-bottom: 1px solid #e4e6eb;
      cursor: pointer;
      transition: background 0.15s;
    }
    .post:hover {
      background: #e7f3ff;
    }
    .post:last-child {
      border-bottom: none;
    }
    .post .text {
      font-size: 13px;
      color: #1c1e21;
      line-height: 1.4;
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .post .metrics {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: #65676b;
      flex-wrap: wrap;
    }
    .post .metrics span {
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .uid-badge {
      background: #e74c3c;
      color: white;
      padding: 1px 8px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
      margin-left: 6px;
    }
    .empty {
      padding: 40px 20px;
      text-align: center;
      color: #65676b;
    }
    .empty .icon {
      font-size: 32px;
      display: block;
      margin-bottom: 8px;
    }
    .empty .sub {
      font-size: 12px;
      color: #8d949e;
      margin-top: 4px;
    }
    .stop-btn {
      display: none;
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .stop-btn:hover { background: #c0392b; }
    .footer-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #e4e6eb;
      align-items: center;
    }
    .export-group {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .export-group .btn {
      padding: 4px 10px;
      font-size: 11px;
    }
    .uid-export-btn {
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .uid-export-btn:hover {
      background: #c0392b;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Facebook Post Scraper and Finder</h1>
  </div>

  <div class="page-info">
    <div class="label">Current Page</div>
    <div class="name" id="pageName">Loading...</div>
  </div>

  <div class="search-box">
    <input type="text" id="keyword" placeholder="Search keyword (optional)" />
    <button class="btn btn-primary" id="searchBtn">🔍 Scrape</button>
  </div>

  <div class="btn-group">
    <button class="btn btn-success" id="autoScrapeBtn">🔄 Auto-Scrape</button>
    <button class="btn btn-danger" id="stopBtn" style="display:none;">⏹ Stop</button>
    <button class="btn btn-outline btn-sm" id="clearBtn">🗑 Clear</button>
  </div>

  <div class="status idle" id="status">Ready to scrape</div>

  <div class="stats" id="stats">
    <div>
      <span class="count" id="postCount">0</span> posts scraped
      <span style="margin-left:12px;color:#e74c3c;">
        👤 <span id="uidCount">0</span> UIDs
      </span>
    </div>
    <div class="scan-info" id="scanInfo">0 scanned</div>
  </div>

  <div class="results-container" id="results">
    <div class="empty">
      <span class="icon">🔍</span>
      No posts scraped yet
      <div class="sub">Click Scrape to start collecting posts</div>
    </div>
  </div>

  <div class="footer-actions">
    <div class="export-group">
      <button class="btn btn-outline btn-sm" id="exportCsvBtn">📄 CSV</button>
      <button class="btn btn-outline btn-sm" id="exportJsonBtn">📋 JSON</button>
      <button class="btn btn-outline btn-sm" id="exportExcelBtn">📊 Excel</button>
      <button class="uid-export-btn" id="exportUidBtn">👤 UIDs</button>
    </div>
    <span style="font-size:11px;color:#8d949e;margin-left:auto;align-self:center;">
      Max: 1000 posts
    </span>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
